name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Create Android app structure
        run: |
          mkdir -p android-app/app/src/main/java/com/vanityglamour/app
          mkdir -p android-app/app/src/main/res/layout
          mkdir -p android-app/app/src/main/res/values
          mkdir -p android-app/app/src/main/res/mipmap-anydpi-v26
          mkdir -p android-app/app/src/main/res/drawable
          mkdir -p android-app/gradle/wrapper

      - name: Create settings.gradle
        run: |
          cat > android-app/settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "VanityGlamour"
          include ':app'
          EOF

      - name: Create root build.gradle
        run: |
          cat > android-app/build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          EOF

      - name: Create gradle.properties
        run: |
          cat > android-app/gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

      - name: Create app build.gradle
        run: |
          cat > android-app/app/build.gradle <<'EOF'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.vanityglamour.app'
              compileSdk 34

              defaultConfig {
                  applicationId "com.vanityglamour.app"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                  }
                  debug {
                      minifyEnabled false
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.7.0'
              implementation 'com.google.android.material:material:1.12.0'
              implementation 'androidx.webkit:webkit:1.11.0'
          }
          EOF

      - name: Create AndroidManifest.xml
        run: |
          cat > android-app/app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="Vanity &amp; Glamour"
                  android:roundIcon="@mipmap/ic_launcher"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.VanityGlamour">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Create MainActivity.java
        run: |
          cat > android-app/app/src/main/java/com/vanityglamour/app/MainActivity.java <<'EOF'
          package com.vanityglamour.app;

          import android.annotation.SuppressLint;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              private WebView webView;

              @SuppressLint("SetJavaScriptEnabled")
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  webView = new WebView(this);
                  setContentView(webView);

                  WebSettings webSettings = webView.getSettings();
                  webSettings.setJavaScriptEnabled(true);
                  webSettings.setDomStorageEnabled(true);
                  webSettings.setAllowFileAccess(true);
                  webSettings.setUseWideViewPort(true);
                  webSettings.setLoadWithOverviewMode(true);

                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl("https://maurizioenardu-ops.github.io/vanity-glamour/");
              }

              @Override
              public void onBackPressed() {
                  if (webView != null && webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          EOF

      - name: Create colors.xml
        run: |
          cat > android-app/app/src/main/res/values/colors.xml <<'EOF'
          <resources>
              <color name="black">#000000</color>
              <color name="white">#FFFFFF</color>
              <color name="navy">#0C1730</color>
          </resources>
          EOF

      - name: Create themes.xml
        run: |
          cat > android-app/app/src/main/res/values/themes.xml <<'EOF'
          <resources xmlns:tools="http://schemas.android.com/tools">
              <style name="Theme.VanityGlamour" parent="Theme.MaterialComponents.DayNight.NoActionBar">
                  <item name="colorPrimary">@color/navy</item>
                  <item name="colorPrimaryVariant">@color/navy</item>
                  <item name="colorOnPrimary">@color/white</item>
                  <item name="android:statusBarColor">@color/navy</item>
              </style>
          </resources>
          EOF

      - name: Create launcher background
        run: |
          cat > android-app/app/src/main/res/drawable/ic_launcher_background.xml <<'EOF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <solid android:color="#0C1730"/>
          </shape>
          EOF

      - name: Create launcher icon
        run: |
          cat > android-app/app/src/main/res/drawable/ic_launcher_foreground.xml <<'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path
                  android:fillColor="#FFFFFF"
                  android:pathData="M24,24h60v60h-60z"/>
              <path
                  android:fillColor="#0C1730"
                  android:pathData="M34,34h40v40h-40z"/>
          </vector>
          EOF

      - name: Create adaptive icon
        run: |
          cat > android-app/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml <<'EOF'
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF

      - name: Create gradle wrapper properties
        run: |
          cat > android-app/gradle/wrapper/gradle-wrapper.properties <<'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Download gradle wrapper jar and script
        run: |
          cd android-app
          curl -L -o gradlew https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradlew
          chmod +x gradlew
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar

      - name: Build debug APK
        run: |
          cd android-app
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vanity-glamour-debug-apk
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
