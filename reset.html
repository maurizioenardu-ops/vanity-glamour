<!doctype html><html lang="it"><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Reset</title>
<style>body{margin:0;font-family:system-ui;background:#0f172a;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px}button{margin-top:20px;border:0;border-radius:14px;padding:14px 18px;font-weight:900}</style>
<body><div><h1>Reset in corso…</h1><p>Fatto. Ora apri l’app pulita.</p><button onclick="location.href='./index.html?v=v5_1'">Apri app</button></div>
<script>
(async()=>{
  try{
    if('serviceWorker' in navigator){
      const regs=await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r=>r.unregister()));
    }
    if(window.caches){
      const ks=await caches.keys();
      await Promise.all(ks.map(k=>caches.delete(k)));
    }
  }catch(e){}
})();
</script>
</body></html>
